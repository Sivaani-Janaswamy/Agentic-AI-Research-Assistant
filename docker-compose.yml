services:
  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      PORT: 8000
      CHROMA_DIR: /data/chroma
    command: gunicorn -k uvicorn.workers.UvicornWorker app:app -w 1 -b 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data/chroma
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    ports:
      - "3000:80"
    depends_on:
      - backend

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppassword}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./backend/ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      # Dashboard import is manual via UI; mount storage for persistence.

volumes:
  pg_data:
  chroma_data:
  grafana_data:
